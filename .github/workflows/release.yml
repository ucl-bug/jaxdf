name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check changelog on version bump
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          if ! grep -q "\[$version\]" CHANGELOG.md; then
            echo "::warning::CHANGELOG.md has no entry for version $version"
          fi

      - name: Release
        uses: patrick-kidger/action_update_python_project@v8
        with:
          python-version: "3.11"
          checkout: false
          test-script: |
            cp -r ${{ github.workspace }}/tests ./tests
            cp ${{ github.workspace }}/pyproject.toml ./pyproject.toml
            uv sync --dev --no-install-project --inexact
            uv pip install jax[cpu]
            JAX_PLATFORMS=cpu uv run --no-sync pytest tests/ -x --ignore=tests/test_module_params.py -o addopts=
          pypi-token: ${{ secrets.PYPI_TOKEN }}
          github-user: ucl-bug
          github-token: ${{ github.token }}

  docs:
    runs-on: ubuntu-latest
    needs: release
    if: success()
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-uv-env
      - name: Deploy docs
        run: uv run mkdocs gh-deploy --force
